<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Meta tags para SEO y accesibilidad -->
    <meta name="description" content="Convierte libros PDF y texto en experiencias de audio accesibles. Optimizado para personas con baja visión y maculopatía." />
    <meta name="keywords" content="audiolibro, accesibilidad, PDF, texto a audio, baja visión, maculopatía, síntesis de voz" />
    <meta name="author" content="AudioLibro App" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://audiobook.app/" />
    <meta property="og:title" content="AudioLibro - Convierte libros a audio" />
    <meta property="og:description" content="Aplicación accesible para convertir libros PDF y texto en experiencias de audio" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://audiobook.app/" />
    <meta property="twitter:title" content="AudioLibro - Convierte libros a audio" />
    <meta property="twitter:description" content="Aplicación accesible para convertir libros PDF y texto en experiencias de audio" />
    <meta property="twitter:image" content="/twitter-image.png" />
    
    <!-- Optimizaciones móviles -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AudioLibro" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Tema de color para navegadores -->
    <meta name="theme-color" content="#4A90E2" />
    <meta name="msapplication-TileColor" content="#1A1A1A" />
    
    <!-- Optimizaciones PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- CSS de optimizaciones móviles -->
    <link rel="stylesheet" href="/mobile-optimizations.css" />
    
    <!-- CSS para lector avanzado -->
    <link rel="stylesheet" href="/advanced-reader-styles.css" />
    
    <!-- Preconectar a fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- CSS crítico inline -->
    <style>
      /* CSS de carga inicial para evitar FOUC */
      :root {
        --color-background-page: #1A1A1A;
        --color-background-surface: #242424;
        --color-text-primary: #E4E4E7;
        --color-text-secondary: #A1A1AA;
        --color-accent-primary: #FFC700;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: var(--color-background-page);
        color: var(--color-text-primary);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Estilos de loading */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--color-background-page);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid var(--color-text-secondary);
        border-top: 4px solid var(--color-accent-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      
      .loading-text {
        color: var(--color-text-primary);
        font-size: 18px;
        font-weight: 500;
        text-align: center;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Ocultar loading cuando la app esté lista */
      .app-loaded .loading-screen {
        display: none;
      }
      
      /* Estilos para lectores de pantalla */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      
      /* Prevenir zoom en inputs en iOS */
      input[type="text"],
      input[type="email"],
      input[type="password"],
      textarea,
      select {
        font-size: 16px !important;
      }
      
      /* Mejorar contraste en modo alto contraste */
      @media (prefers-contrast: high) {
        :root {
          --color-background-page: #000000;
          --color-background-surface: #000000;
          --color-text-primary: #FFFFFF;
          --color-text-secondary: #CCCCCC;
          --color-accent-primary: #FFFFFF;
        }
      }
      
      /* Respeta movimiento reducido */
      @media (prefers-reduced-motion: reduce) {
        .loading-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  
  <body>
    <!-- Loading screen inicial -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Cargando AudioLibro...</div>
    </div>
    
    <!-- Div principal para React -->
    <div id="root"></div>
    
    <!-- Div para anuncios a lectores de pantalla -->
    <div id="a11y-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    
    <!-- Mensaje para navegadores sin soporte -->
    <noscript>
      <div style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #1A1A1A;
        color: #E4E4E7;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 20px;
        text-align: center;
        font-family: system-ui, sans-serif;
      ">
        <h1 style="margin-bottom: 16px; font-size: 24px;">JavaScript Requerido</h1>
        <p style="margin-bottom: 16px; font-size: 16px;">
          AudioLibro requiere JavaScript para funcionar correctamente.
        </p>
        <p style="font-size: 14px; color: #A1A1AA;">
          Por favor, habilita JavaScript en tu navegador y recarga la página.
        </p>
      </div>
    </noscript>
    
    <!-- Script para manejar el loading screen -->
    <script>
      // Ocultar loading screen cuando la app esté lista
      window.addEventListener('DOMContentLoaded', () => {
        // Dar tiempo para que React se monte
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          const body = document.body;
          
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.3s ease-out';
            
            setTimeout(() => {
              body.classList.add('app-loaded');
              if (loadingScreen.parentNode) {
                loadingScreen.parentNode.removeChild(loadingScreen);
              }
            }, 300);
          }
        }, 1000);
      });
      
      // Manejar errores de JavaScript
      window.addEventListener('error', (e) => {
        console.error('Error de JavaScript:', e.error);
      });
      
      window.addEventListener('unhandledrejection', (e) => {
        console.error('Promesa rechazada:', e.reason);
      });
    </script>
    
    <!-- Script principal de la aplicación -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
